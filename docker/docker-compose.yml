# P4 媒体子系统 docker-compose
# ---------------------------------------------------------------------------
# 仅声明 MinIO + 初始化 sidecar；MySQL/Redis/etcd/RabbitMQ/ES 由其它阶段或本机
# 直装提供，不在本文件重复声明。
#
# 启动：
#   cd docker && docker compose up -d minio minio-init
#
# 端点：
#   - S3 API:    http://localhost:9000   (用户名/密码：minioadmin/minioadmin)
#   - Console:   http://localhost:9001
#
# bucket 由 minio-init sidecar 自动创建（详见 minio-init/entrypoint.sh）。

version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: chatnow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 30
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: chatnow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init/entrypoint.sh"]
    environment:
      # mc alias 名固定为 "local"（与 entrypoint.sh 中保持一致）
      MC_HOST_local: http://minioadmin:minioadmin@minio:9000
    volumes:
      - ./minio-init:/init:ro

volumes:
  minio-data:
