/*
    推送服务 (Push) 子服务注册信息：
        服务名称：/service/push
        实例 ID:  instance_id  每个推送实例唯一 ID
    职责：终结客户端 WebSocket 长连接、订阅 msg_push_queue、维护在线路由表
          并对外提供 brpc 接口让其它服务（friend / chatsession / message）下发通知。
*/
syntax = "proto3";
package chatnow;
import "base.proto";
import "notify.proto";

option cc_generic_services = true;

// 单用户推送（其它服务调用 Push 服务的入口）
message PushToUserReq {
    string request_id = 1;
    string user_id = 2;            // 目标用户
    NotifyMessage notify = 3;      // 透传通知体（沿用现有 NotifyMessage）
    optional uint64 user_seq = 4;  // 仅 CHAT_MESSAGE_NOTIFY 使用，便于 ACK 重传
}

message PushToUserRsp {
    string request_id = 1;
    bool success = 2;
    string errmsg = 3;
    // 该用户当前在线设备数（0 表示未在线，调用方据此决定是否走离线兜底）
    int32 online_device_count = 4;
}

// 批量推送（如群消息一次广播 N 个收件人）
message PushBatchReq {
    string request_id = 1;
    repeated string user_id_list = 2;
    NotifyMessage notify = 3;
    // user_id → user_seq 的映射（仅 CHAT_MESSAGE_NOTIFY 使用）
    repeated UserSeqPair user_seqs = 4;
}

message PushBatchRsp {
    string request_id = 1;
    bool success = 2;
    string errmsg = 3;
    int32 online_count = 4;        // 实际投递的在线用户数
}

service PushService {
    rpc PushToUser(PushToUserReq) returns (PushToUserRsp);
    rpc PushBatch(PushBatchReq) returns (PushBatchRsp);
}
